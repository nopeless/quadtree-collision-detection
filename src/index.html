<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D Rigid Body Physics: O(n²) vs QuadTree</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="controls">
      <div>
        <label for="algorithm">Implementation: </label>
        <select id="algorithm">
          <option value="naive" selected>O(n²) Bruteforce</option>
          <option value="quadtree">QuadTree Optimized</option>
          <option value="quadtree-keep">QuadTree Keep</option>
        </select>
      </div>
      <div>
        <label for="bucketSize">Bucket Size: </label>
        <select id="bucketSize">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4" selected>4</option>
          <option value="8">8</option>
          <option value="16">16</option>
          <option value="32">32</option>
          <option value="64">64</option>
          <option value="128">128</option>
          <option value="256">256</option>
        </select>
      </div>
      <div>
        <label for="particleCount">Particles: </label>
        <select id="particleCount">
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="250" selected>250</option>
          <option value="500">500</option>
          <option value="1000">1000</option>
          <option value="2500">2500</option>
          <option value="5000">5000</option>
          <option value="10000">10000</option>
          <option value="25000">25000</option>
        </select>
      </div>
      <div>
        <label for="speed">Speed: </label>
        <select id="speed">
          <option value="0.1">0.1</option>
          <option value="0.25">0.25</option>
          <option value="0.5">0.5</option>
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="4">4</option>
          <option value="8">8</option>
        </select>
      </div>
      <div>
        <button id="playPauseBtn">Pause</button>
        <button id="stepBtn" disabled>Step</button>
      </div>
      <div class="stats" id="tpsDisplay">TPS: 0</div>
      <a href="https://github.com/nopeless/quadtree-collision-detection/" target="_blank">Source Code</a>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module" src="/javascript/main.ts"></script>
  </body>
</html>
