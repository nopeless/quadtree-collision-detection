<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D Rigid Body Physics: O(n²) vs QuadTree</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div class="controls">
      <div>
        <label for="algorithm">Implementation: </label>
        <select id="algorithm">
          <option value="naive" selected>O(n²) Bruteforce</option>
          <option value="quadtree">QuadTree Optimized</option>
        </select>
      </div>
      <div>
        <label for="bucketSize">Bucket Size: </label>
        <select id="bucketSize">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4" selected>4</option>
          <option value="8">8</option>
          <option value="16">16</option>
        </select>
      </div>
      <div>
        <label for="particleCount">Particles: </label>
        <select id="particleCount">
          <option value="5">5</option>
          <option value="20">20</option>
          <option value="100">100</option>
          <option value="250" selected>250</option>
          <option value="500">500</option>
          <option value="1000">1000</option>
          <option value="2000">2000</option>
        </select>
      </div>
      <div>
        <label for="speed">Speed: </label>
        <select id="speed">
          <option value="0.5">0.5</option>
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="4">4</option>
          <option value="8">8</option>
        </select>
      </div>
      <div>
        <button id="playPauseBtn">Pause</button>
        <button id="stepBtn" disabled>Step</button>
      </div>
      <div class="stats" id="tpsDisplay">TPS: 0</div>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module" src="/javascript/main.ts"></script>
  </body>
</html>
